# Bastion reviewer registry for jessica.black ("The Shell").
#
# Reviewers are declarative and static: one concern each, defined here rather
# than generated by code, so they stay reviewable and produce a stable trigger
# set. Changes to this file are CODEOWNERS-protected (see .github/CODEOWNERS),
# so loosening a trigger or editing a prompt needs a human review.
#
# Both reviewers run on OpenAI's Codex CLI, billed to the PR author's ChatGPT
# subscription. CI authenticates Codex per author by rehydrating that person's
# ~/.codex/auth.json from a secret; see .github/workflows/bastion.yml. The
# schema is documented at https://bastion.jessica.black/guide/authoring-reviewers.md

# Registry-wide defaults, inherited by every reviewer that does not set the
# field itself (an explicit field on a reviewer wins). Each reviewer below pins
# `backend: codex`, which satisfies the rule that an inherited `model` needs a
# pinned backend (a model under `backend: any` is a load error). The Codex
# backend forwards `model` as `-m` and `effort` as `model_reasoning_effort`.
defaults:
  model: gpt-5.5
  effort: high

reviewers:
  # The site runs as a shell, and a visitor-supplied URL fragment can run a
  # command (`#cmd=...`). That makes the hash untrusted input anyone can fold
  # into a shared link, so it carries a safety boundary the in-app prompt does
  # not. This gate guards that boundary.
  - name: hash-command-safety
    trigger: [app/shell.tsx]
    mode: gate
    backend: codex
    prompt: |
      This site runs as a shell, and a visitor-supplied URL fragment can run a
      command: the page reads `#cmd=<command>` from the location hash and runs
      it after boot (see commandFromLocationHash, decodeHashCommandValue, and
      the HASH_COMMAND_* handling in app/shell.tsx). The hash is untrusted input
      anyone can craft into a shared link, so it has a safety boundary the live
      prompt does not: a hash-launched command must never be able to navigate or
      send the visitor elsewhere, exfiltrate data, or inject markup just because
      someone opened a link.

      The existing guard: HASH_BLOCKED_COMMANDS = {open, xdg-open, start}, and
      commandContainsBlockedOpen splits the command on `&&` and refuses the run
      if any segment's head verb is in that set, so a shared link cannot
      auto-open an external target. Hash-originated runs pass blockOpen;
      commands a visitor types themselves are intentionally unrestricted.

      This is a gate. Block the PR if the change could let a crafted `#cmd=`
      link do something the guard exists to prevent; otherwise approve it.
      Concretely, block when:

      - It weakens or removes the hash-launch gating (the blocked-verb set, the
        per-segment check, or the wiring that marks hash-originated runs as
        blocked), so a shared link can again reach open/xdg-open/start or any new
        command that performs external navigation, window.open, a location
        change, or a network send.
      - It adds or changes a command reachable from the hash that can navigate
        the page, open an external target, or transmit data without routing
        through the same block.
      - It changes how the hash command string is parsed or split so the
        blocked-verb check can be bypassed: a new chaining or sequencing
        separator (`;`, `|`, a newline, a subshell) that the `&&`-only split does
        not cover, or quoting/decoding that hides a blocked verb from
        commandHead.
      - It renders the raw hash value or its output as HTML (for example
        dangerouslySetInnerHTML), enabling markup or script injection from a
        shared link.

      Approve and treat as out of scope: commands reachable only when a visitor
      TYPES them into the live prompt (that path is deliberately unrestricted),
      pure styling or content edits, and refactors that keep the hash-launch
      guard equivalent. When you block, name the exact code path and the
      crafted-link scenario it enables.

  # House prose voice. The site's visitor-facing copy and the docs should read
  # like a person wrote them, free of AI-register "slop" and of em/en dashes
  # (this project writes plain ASCII punctuation). A gate: a false block is
  # cheap to override, and the tells are mechanical.
  - name: prose-anti-slop
    trigger: [app/shell.tsx, README.md, docs/**/*.md]
    mode: gate
    backend: codex
    prompt: |
      As a gate, review only the user-facing PROSE in the changed files for
      AI-register "slop": the structural tics that make copy read as
      machine-written. The tells are structural, not vocabulary, so do not just
      hunt for buzzwords.

      Where the prose lives here: Markdown (README.md, docs/**) and the site
      copy embedded as string and JSX-text literals in app/shell.tsx (resume
      blurbs, skill descriptions, project notes, man pages, help text, and
      similar visitor-facing strings). Review that authored copy. Do NOT flag
      code: identifiers, JSX structure, types, imports, the procedurally
      generated boot-reel strings (the kernel and systemd log lines), or any
      other non-prose token.

      Decision:

      - If the changed prose carries one or more slop tells from the list below,
        return verdict: block. Enumerate EVERY instance across all changed prose
        in this single pass: emit one blocking finding per instance, each naming
        the file, the line or sentence, which tell it is, and a shorter rewrite
        that keeps every fact. Do not stop after the first.
      - If the changed prose is clean, return verdict: pass.
      - Bias toward catching slop: a false block is cheap to override, but slop
        that merges becomes the house style. Still flag slop, not every
        stylistic choice.

      Flag these:

      - Em dashes or en dashes, and the literal " -- " used as a dash, in prose.
        This project writes plain ASCII: recast with a comma, a colon, or
        parentheses, or split the sentence. Ignore "--flag" forms in commands
        and code.
      - Manufactured antithesis ("X, not Y") where the second half is a strawman
        or a vibe rather than a real, distinct, true alternative.
      - Aphorism openers or closers: a sentence that opens or closes on a tidy
        maxim rather than a fact.
      - Triadic parallelism or rule-of-three cadence used for rhythm rather than
        because there are exactly three real, distinct items.
      - The dramatic colon: a setup then a payoff staged for suspense.
      - Virtue or character framing: prose that asserts something is honest,
        humble, thoughtful, or principled instead of saying what it is or does.
      - The meta-pattern: every sentence doing rhetorical work. Real copy is
        lumpier and lets some sentences be flat and informational.

      Discipline:

      - Touch only prose. Leave code, JSX markup, command examples, and quoted
        or third-party material exactly as they are.
      - Do not over-correct. Flat, antithesis-phobic, fragment-phobic prose is
        its own tell; one beat of personality is fine. Block slop, not voice.
      - Apply the test: if a fact survives the rewrite and the copy got shorter,
        the cut was slop. If a rewrite would drop information, do not suggest it.
